<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Pattern B: Soft Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 390px;
    margin: 0 auto;
    background: #fef7ed;
    color: #3d2c1e;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .pattern-label {
    background: #fed7aa;
    color: #9a3412;
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    padding: 6px 0;
  }

  .container {
    padding: 20px 20px 120px;
  }

  /* Decorative wave at top */
  .deco-wave {
    position: relative;
    margin-bottom: 8px;
  }

  .deco-wave::after {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, #f97316, #fb923c, #fdba74, #fed7aa);
    border-radius: 2px;
    margin-bottom: 16px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .app-title {
    font-family: 'Quicksand', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #3d2c1e;
  }

  .streak-badge {
    background: linear-gradient(135deg, #f3e8ff, #ede9fe);
    padding: 6px 16px;
    border-radius: 24px;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #7c3aed;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .greeting {
    font-size: 15px;
    color: #8b7355;
    margin-bottom: 24px;
  }

  /* Section heading */
  .section-title {
    font-family: 'Quicksand', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #3d2c1e;
    margin-bottom: 12px;
  }

  /* Today's Menu */
  .menu-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }

  .menu-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    border-left: 5px solid transparent;
    position: relative;
    transform: rotate(-0.3deg);
  }

  .menu-card:nth-child(2) { transform: rotate(0.2deg); }
  .menu-card:nth-child(3) { transform: rotate(-0.15deg); }

  .menu-card.weak { border-left-color: #fb923c; }
  .menu-card.review { border-left-color: #a78bfa; }
  .menu-card.challenge { border-left-color: #34d399; }

  .menu-emoji {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .menu-emoji.weak { background: #fff7ed; }
  .menu-emoji.review { background: #f5f3ff; }
  .menu-emoji.challenge { background: #ecfdf5; }

  .menu-content { flex: 1; }

  .menu-type {
    display: inline-block;
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 12px;
    margin-bottom: 4px;
  }

  .menu-type.weak { background: #ffedd5; color: #c2410c; }
  .menu-type.review { background: #ede9fe; color: #6d28d9; }
  .menu-type.challenge { background: #d1fae5; color: #047857; }

  .menu-title {
    font-size: 14px;
    font-weight: 500;
    color: #3d2c1e;
  }

  .menu-meta {
    font-family: 'Quicksand', sans-serif;
    font-size: 20px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .menu-meta.weak { color: #ea580c; }
  .menu-meta.review { color: #7c3aed; }
  .menu-meta.challenge { color: #059669; }

  /* Quick Stats */
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
  }

  .stat-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .stat-circle:nth-child(1) { background: linear-gradient(135deg, #fff7ed, #ffedd5); }
  .stat-circle:nth-child(2) { background: linear-gradient(135deg, #f5f3ff, #ede9fe); }
  .stat-circle:nth-child(3) { background: linear-gradient(135deg, #ecfdf5, #d1fae5); }

  .stat-number {
    font-family: 'Quicksand', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-circle:nth-child(1) .stat-number { color: #ea580c; }
  .stat-circle:nth-child(2) .stat-number { color: #7c3aed; }
  .stat-circle:nth-child(3) .stat-number { color: #059669; }

  .stat-unit {
    font-size: 12px;
    color: #8b7355;
    margin-top: 2px;
  }

  /* Subject Progress */
  .subjects {
    margin-bottom: 28px;
  }

  .subject-item {
    background: #ffffff;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .subject-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .subject-name {
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #3d2c1e;
  }

  .subject-percent {
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #f97316;
  }

  .progress-bar-track {
    height: 10px;
    background: #f5f0eb;
    border-radius: 5px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s ease;
  }

  .progress-bar-fill.orange { background: linear-gradient(90deg, #fb923c, #f97316); }
  .progress-bar-fill.blue { background: linear-gradient(90deg, #93c5fd, #3b82f6); }
  .progress-bar-fill.green { background: linear-gradient(90deg, #86efac, #22c55e); }

  /* Subtopics expanded */
  .subtopics {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed #e8dfd6;
  }

  .subtopic-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .subtopic-name {
    font-size: 12px;
    color: #8b7355;
    width: 100px;
    flex-shrink: 0;
  }

  .subtopic-bar-track {
    flex: 1;
    height: 8px;
    background: #f5f0eb;
    border-radius: 4px;
    overflow: hidden;
  }

  .subtopic-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #fdba74, #fb923c);
  }

  .subtopic-percent {
    font-family: 'Quicksand', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #8b7355;
    width: 32px;
    text-align: right;
  }

  /* Quick Actions */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .action-btn {
    background: #ffffff;
    border: none;
    border-radius: 20px;
    padding: 16px 8px;
    text-align: center;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #3d2c1e;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    cursor: pointer;
  }

  .action-icon {
    font-size: 24px;
    display: block;
    margin-bottom: 6px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    background: #ffffff;
    border-radius: 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    padding: 10px 8px;
    z-index: 10;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 10px;
    font-weight: 500;
    color: #bfae98;
    cursor: pointer;
  }

  .nav-item.active {
    color: #f97316;
  }

  .nav-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .nav-item.active .nav-dot {
    background: #fff7ed;
  }
</style>
</head>
<body>

<div class="pattern-label">Pattern B: Soft Companion</div>

<div class="container">

  <div class="deco-wave"></div>

  <!-- Header -->
  <div class="header">
    <div class="app-title">国試ノート</div>
    <div class="streak-badge">
      <span>&#9733;</span> 5日連続
    </div>
  </div>

  <div class="greeting">こんにちは！今日も頑張ろう &#128170;</div>

  <!-- Today's Menu -->
  <div class="section-title">&#127881; 今日のメニュー</div>
  <div class="menu-cards">
    <div class="menu-card weak">
      <div class="menu-emoji weak">&#9888;&#65039;</div>
      <div class="menu-content">
        <div class="menu-type weak">苦手</div>
        <div class="menu-title">薬理 交感神経系</div>
      </div>
      <div class="menu-meta weak">33%</div>
    </div>

    <div class="menu-card review">
      <div class="menu-emoji review">&#128218;</div>
      <div class="menu-content">
        <div class="menu-type review">復習カード</div>
        <div class="menu-title">復習カード</div>
      </div>
      <div class="menu-meta review">8枚</div>
    </div>

    <div class="menu-card challenge">
      <div class="menu-emoji challenge">&#127942;</div>
      <div class="menu-content">
        <div class="menu-type challenge">チャレンジ</div>
        <div class="menu-title">化学 有機化合物</div>
      </div>
      <div class="menu-meta challenge">78%</div>
    </div>
  </div>

  <!-- Quick Stats -->
  <div class="section-title">&#128202; がんばり記録</div>
  <div class="stats-row">
    <div class="stat-circle">
      <div class="stat-number">142</div>
      <div class="stat-unit">問</div>
    </div>
    <div class="stat-circle">
      <div class="stat-number">8</div>
      <div class="stat-unit">枚</div>
    </div>
    <div class="stat-circle">
      <div class="stat-number">5</div>
      <div class="stat-unit">日</div>
    </div>
  </div>

  <!-- Subject Progress -->
  <div class="section-title">&#128214; 科目べつ進み具合</div>
  <div class="subjects">
    <div class="subject-item">
      <div class="subject-header">
        <span class="subject-name">薬理</span>
        <span class="subject-percent">45%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill orange" style="width:45%"></div>
      </div>
      <div class="subtopics">
        <div class="subtopic-row">
          <span class="subtopic-name">交感神経系</span>
          <div class="subtopic-bar-track"><div class="subtopic-bar-fill" style="width:80%"></div></div>
          <span class="subtopic-percent">80%</span>
        </div>
        <div class="subtopic-row">
          <span class="subtopic-name">副交感神経系</span>
          <div class="subtopic-bar-track"><div class="subtopic-bar-fill" style="width:60%"></div></div>
          <span class="subtopic-percent">60%</span>
        </div>
        <div class="subtopic-row">
          <span class="subtopic-name">抗がん剤</span>
          <div class="subtopic-bar-track"><div class="subtopic-bar-fill" style="width:20%"></div></div>
          <span class="subtopic-percent">20%</span>
        </div>
        <div class="subtopic-row">
          <span class="subtopic-name">ホルモン薬</span>
          <div class="subtopic-bar-track"><div class="subtopic-bar-fill" style="width:0%"></div></div>
          <span class="subtopic-percent">0%</span>
        </div>
      </div>
    </div>

    <div class="subject-item">
      <div class="subject-header">
        <span class="subject-name">化学</span>
        <span class="subject-percent">72%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill blue" style="width:72%"></div>
      </div>
    </div>

    <div class="subject-item">
      <div class="subject-header">
        <span class="subject-name">生物</span>
        <span class="subject-percent">35%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill green" style="width:35%"></div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="section-title">&#9889; クイックアクション</div>
  <div class="actions">
    <div class="action-btn">
      <span class="action-icon">&#128269;</span>
      自分で選ぶ
    </div>
    <div class="action-btn">
      <span class="action-icon">&#128204;</span>
      付箋
    </div>
    <div class="action-btn">
      <span class="action-icon">&#127922;</span>
      ランダム10
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-dot">&#127968;</div>
    ホーム
  </div>
  <div class="nav-item">
    <div class="nav-dot">&#9997;&#65039;</div>
    演習
  </div>
  <div class="nav-item">
    <div class="nav-dot">&#128221;</div>
    ノート
  </div>
  <div class="nav-item">
    <div class="nav-dot">&#128200;</div>
    分析
  </div>
</div>

</body>
</html>
